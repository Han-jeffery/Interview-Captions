<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITC-View</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>ITC-View</h1>
        </div>
        <div class="status" id="status">未连接</div>
      </header>

      <section class="controls">
        <label>
          音频输入
          <select id="deviceSelect"></select>
        </label>
        <label>
          语言
          <select id="languageSelect">
            <option value="zh-CN" selected>中文 (中英混合)</option>
            <option value="en-US">English</option>
          </select>
        </label>
        <button id="refreshBtn" type="button">刷新设备</button>
        <button id="startBtn" type="button">开始监听</button>
        <button id="stopBtn" type="button" disabled>停止</button>
        <button id="generateBtn" type="button" title="根据当前字幕生成回答">生成回答</button>
        <button id="materialBtn" type="button" title="导入面试资料">📁 资料</button>
      </section>

      <section class="audio-meter" title="输入音量">
        <span>输入音量</span>
        <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
        <span id="frameCount">0 frames</span>
        <span class="visible-status" id="visibleStatus">未开始</span>
      </section>

      <section class="grid">
        <article class="panel">
          <header>
            <h2>实时字幕</h2>
            <button id="clearTranscriptBtn" type="button">清空</button>
          </header>
          <div class="partial" id="partial"></div>
          <div class="transcript" id="transcript"></div>
        </article>

        <article class="panel answer-panel">
          <header>
            <h2>AI 答题建议</h2>
            <button id="clearAnswerBtn" type="button">清空</button>
          </header>
          <div class="question" id="question"></div>
          <pre class="answer" id="answer"></pre>
        </article>
      </section>
    </main>

    <!-- 资料导入弹窗 -->
    <section class="material-modal hidden" id="materialModal" aria-modal="true" role="dialog">
      <div class="material-card">
        <header>
          <strong>导入资料</strong>
          <button id="materialCloseBtn" type="button">✕</button>
        </header>
        <div class="drop-zone" id="dropZone">
          <div class="drop-title">把 Word / PDF / 文本资料拖到这里</div>
          <div class="drop-subtitle">支持 .docx, .pdf, .txt, .md</div>
          <button id="chooseMaterialBtn" type="button">选择文件</button>
        </div>
        <div class="material-result" id="materialResult">资料仅保存在当前浏览器中</div>
        <div class="material-actions">
          <button id="clearMaterialBtn" type="button">清空资料</button>
        </div>
      </div>
    </section>
    <input id="materialInput" type="file" accept=".txt,.md,.docx,.pdf,text/plain,text/markdown,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden />

    <script>
  // 激活码校验
  (function() {
    const saved = localStorage.getItem("itcview_activation");
    if (!saved) { window.location.href = "/activate.html"; return; }
    try {
      const data = JSON.parse(saved);
      if (!data.token) { localStorage.removeItem("itcview_activation"); window.location.href = "/activate.html"; return; }
      fetch("/api/verify-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: data.token })
      }).then(r => r.json()).then(res => {
        if (!res.ok) {
          localStorage.removeItem("itcview_activation");
          window.location.href = "/activate.html";
        }
      }).catch(() => {
        // 网络错误也放行，避免误拦
      });
    } catch { localStorage.removeItem("itcview_activation"); window.location.href = "/activate.html"; }
  })();
</script>
<script src="/app.js" type="module"></script>
  </body>
</html>
