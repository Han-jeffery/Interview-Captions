<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试Go - AI实时面试助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>🎙️ 面试Go</h1>
          <p>AI 实时面试助手 · 中英文双语字幕 · DeepSeek 智能答题</p>
        </div>
        <div class="status" id="status">未连接</div>
      </header>

      <section class="controls">
        <label>
          音频输入
          <select id="deviceSelect"></select>
        </label>
        <label>
          语言
          <select id="languageSelect">
            <option value="zh-CN" selected>中文 (中英混合)</option>
            <option value="en-US">English</option>
          </select>
        </label>
        <button id="refreshBtn" type="button">刷新设备</button>
        <button id="startBtn" type="button">开始监听</button>
        <button id="stopBtn" type="button" disabled>停止</button>
      </section>

      <section class="audio-meter" title="输入音量">
        <span>输入音量</span>
        <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
        <span id="frameCount">0 frames</span>
        <span class="visible-status" id="visibleStatus">未开始</span>
      </section>

      <section class="grid">
        <article class="panel">
          <header>
            <h2>实时字幕</h2>
            <button id="clearTranscriptBtn" type="button">清空</button>
          </header>
          <div class="partial" id="partial"></div>
          <div class="transcript" id="transcript"></div>
        </article>

        <article class="panel answer-panel">
          <header>
            <h2>AI 答题建议</h2>
            <button id="clearAnswerBtn" type="button">清空</button>
          </header>
          <div class="question" id="question"></div>
          <pre class="answer" id="answer"></pre>
        </article>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
